{% extends 'base.html' %}

{% block title %}
Cadastro
{% endblock title %}

{% block content %}
<h1>Cadastro de Usuário</h1>
<hr>
<form action="{% url 'cadastro' %}" method="post">
    {% csrf_token %}
    <table>
        {{form.as_table}}
    </table>

    {% if messages %}
    <ul>
        {% for message in messages %}
        <li style="color: brown;"><strong>{{message.tags}}:</strong>{{message}}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <button type="submit">Cadastrar</button>
</form>
{% endblock content %}
